# SwiftLint configuration for SomaFM Player

# Paths to include/exclude
included:
  - Sources
  - Tests
excluded:
  - .build
  - build
  - Package.swift

# Rule configuration
disabled_rules:
  - todo  # We might have TODOs during development
  - line_length  # Can be too restrictive for some code

opt_in_rules:
  - empty_count
  - empty_string
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_object_literal
  - empty_collection_literal
  - empty_xctest_method
  - fallthrough
  - first_where
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - modifier_order
  - nimble_operator
  - nslocalizedstring_key
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - quick_discouraged_focused_test
  - quick_discouraged_pending_test
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - single_test_class
  - sorted_first_last
  - static_operator
  - strong_iboutlet
  - test_case_accessibility
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - untyped_error_in_catch
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - xct_specific_matcher
  - yoda_condition

# Rule parameters
force_cast: warning
force_try:
  severity: warning
identifier_name:
  min_length: 2
  max_length: 40
  excluded:
    - id
    - url
    - to
type_name:
  min_length: 3
  max_length: 40
function_body_length:
  warning: 120
  error: 150
file_length:
  warning: 550
  error: 800
type_body_length:
  warning: 350
  error: 400
cyclomatic_complexity:
  warning: 10
  error: 20
nesting:
  type_level: 2
  function_level: 3

# Custom rules
custom_rules:
  no_print_statements:
    name: "Avoid print statements"
    regex: '\bprint\('
    message: "Use proper logging instead of print statements"
    severity: warning
    
  mark_format:
    name: "MARK format"
    regex: '// MARK: [^-]'
    message: "Use // MARK: - format with hyphen"
    severity: warning